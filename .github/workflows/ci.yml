name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MACOSX_DEPLOYMENT_TARGET: "26.0"

jobs:
  build:
    name: Lint, test, and build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: extractions/setup-just@v3

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Rust format check
        run: cd core && cargo fmt --check

      - name: Rust lint
        run: just lint

      - name: Rust tests
        run: just test

      - name: Build app bundle
        run: just bundle

      - name: Sanity-check the bundle
        run: |
          test -x dist/Context.app/Contents/MacOS/Context
          plutil -lint dist/Context.app/Contents/Info.plist
          codesign --verify dist/Context.app

      - uses: actions/upload-artifact@v4
        with:
          name: Context.app
          path: dist/Context.app
          if-no-files-found: error
